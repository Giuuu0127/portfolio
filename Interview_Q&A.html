<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 예상질문 - 프로젝트R 시스템 기획자</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #f0c040;
    --accent-dim: rgba(240, 192, 64, 0.12);
    --danger: #ff6b6b;
    --success: #4ecdc4;
    --info: #6c9bff;
    --purple: #b388ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  .header {
    padding: 60px 40px 40px;
    max-width: 900px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-weight: 600;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  .header p {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 640px;
  }

  .stats {
    display: flex;
    gap: 32px;
    margin-top: 28px;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-dim);
  }

  .nav {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 40px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: rgba(10, 10, 15, 0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }

  .nav-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px;
  }

  .category {
    margin-bottom: 56px;
    animation: fadeUp 0.4s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .category-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .category-title {
    font-size: 20px;
    font-weight: 700;
  }

  .category-desc {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 24px;
    padding-left: 54px;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .question-card:hover { border-color: #3a3a50; }

  .question-top {
    padding: 20px 24px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    user-select: none;
  }

  .q-number {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 9px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-body { flex: 1; }

  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
  }

  .q-tags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .q-tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 500;
  }

  .q-tag.high { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
  .q-tag.mid { background: rgba(240, 192, 64, 0.15); color: var(--accent); }
  .q-tag.low { background: rgba(78, 205, 196, 0.15); color: var(--success); }
  .q-tag.type { background: rgba(108, 155, 255, 0.12); color: var(--info); }

  .q-expand {
    color: var(--text-dim);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform 0.25s;
    margin-top: 2px;
  }

  .q-expand.open { transform: rotate(180deg); }

  .answer-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .answer-panel.open { max-height: 1200px; }

  .answer-inner {
    padding: 0 24px 24px;
    padding-left: 62px;
  }

  .answer-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .answer-text {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .answer-text strong { color: var(--text); font-weight: 600; }

  .answer-text ul {
    margin: 8px 0;
    padding-left: 18px;
  }

  .answer-text li { margin-bottom: 4px; }

  .tip-box {
    background: var(--accent-dim);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin-top: 14px;
    font-size: 13px;
    color: var(--text);
  }

  .tip-box::before {
    content: '💡 TIP';
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .footer {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  @media (max-width: 640px) {
    .header, .nav, .content { padding-left: 20px; padding-right: 20px; }
    .header h1 { font-size: 24px; }
    .stats { gap: 20px; }
    .answer-inner { padding-left: 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Interview Preparation</div>
  <h1>[프로젝트R] 시스템 기획자 면접 예상질문</h1>
  <p>공고 요구사항 × 현규님 이력 교차 분석 기반, 실전 면접에서 나올 확률이 높은 질문들을 카테고리별로 정리했습니다.</p>
  <div class="stats">
    <div class="stat"><span class="stat-num">25</span><span class="stat-label">예상질문</span></div>
    <div class="stat"><span class="stat-num">5</span><span class="stat-label">카테고리</span></div>
    <div class="stat"><span class="stat-num">12</span><span class="stat-label">출제확률 높음</span></div>
  </div>
</div>

<div class="nav" id="nav"></div>
<div class="content" id="content"></div>
<div class="footer">공고 분석 기반 예상질문 · 강현규 면접 대비용</div>

<script>
const data = [
  {
    id: 'experience',
    icon: '⚔️',
    color: '#ff6b6b',
    title: 'MMORPG 경력 & 실무 경험',
    desc: '공고 핵심 — 4년 이상 MMORPG 시스템 기획 경력 검증. 가장 많은 질문이 나올 영역입니다.',
    questions: [
      {
        q: 'Bless Online에서 Steam 글로벌 런칭을 위해 전투 시스템을 리뉴얼하셨는데, 기존 시스템의 어떤 문제를 진단했고 콤보/스탠스 기반으로 전환한 이유는 무엇인가요?',
        prob: 'high',
        type: '경험 검증',
        answer: '<strong>Bless Online의 전투 리뉴얼</strong>은 현규님의 가장 강력한 MMORPG 경험입니다. 답변 시 세 가지를 구조화하세요:<ul><li><strong>진단:</strong> 기존 정적 전투의 어떤 지표/피드백이 문제였는지 (북미·유럽 유저 성향 분석)</li><li><strong>설계 근거:</strong> 왜 콤보/스탠스였는지, Non-Targeting으로 전환한 논리</li><li><strong>결과:</strong> Steam 런칭 후 전투 관련 긍정 지표가 어떻게 변했는지</li></ul><div class="tip-box">레인저 클래스 재설계 경험을 구체적으로 풀면 "클래스 설계 역량"까지 어필할 수 있어요.</div>'
      },
      {
        q: 'Bless Unleashed에서 PC/Console 멀티 플랫폼 대응을 하셨는데, MMORPG에서 플랫폼별 UX 차이를 어떻게 해결하셨나요?',
        prob: 'high',
        type: '실무 역량',
        answer: 'PC(키보드/마우스)와 콘솔(패드) 간의 <strong>커뮤니케이션 시스템·커뮤니티·길찾기 UX를 이원화</strong>한 경험을 구체적으로 설명하세요. 특히:<ul><li>입력 장치별 어떤 UX 차이를 만들었는지</li><li>오픈월드에서 네비게이션 로직을 플랫폼별로 어떻게 최적화했는지</li><li>글로벌 동시 런칭에서 발생한 이슈와 해결 과정</li></ul><div class="tip-box">멀티 플랫폼 MMORPG 출시 경험은 업계에서 매우 희소합니다. 이 경험을 자신 있게 어필하세요.</div>'
      },
      {
        q: 'MMORPG 라이브 서비스에서 이벤트 시스템을 설계하셨다고 하셨는데, 서버 다운 없이 이벤트를 제어하는 구조를 어떻게 만드셨나요?',
        prob: 'mid',
        type: '라이브 운영',

      },
      {
        q: '길드전(RvR) 콘텐츠를 메인 담당으로 설계하셨는데, 대규모 PvP 밸런스를 어떻게 잡으셨나요?',
        prob: 'high',
        type: '핵심 콘텐츠',
        answer: 'MMORPG 시스템 기획자 면접에서 <strong>PvP 밸런스 경험</strong>은 거의 반드시 물어봅니다.<ul><li>길드전 규칙/프로세스의 설계 철학</li><li>전용 필드 레벨 디자인에서 고려한 요소 (지형 이점, 스폰 위치 등)</li><li>대규모 전투에서의 서버 부하 vs 재미 간의 트레이드오프</li></ul><div class="tip-box">프로젝트R이 4X MMORTS이지만 회사가 MMORPG를 개발 중이므로, RvR 경험은 매우 높은 가치를 가집니다.</div>'
      },
      {
        q: '경력 11년 동안 MMORPG → 슈터 → MMORTS 등 다양한 장르를 경험하셨는데, 이번에 다시 MMORPG로 돌아오려는 이유는 무엇인가요?',
        prob: 'high',
        type: '동기 확인',
        answer: '지원 동기를 묻는 핵심 질문입니다. <strong>"다양한 장르 경험이 오히려 MMORPG 설계를 더 풍부하게 만든다"</strong>는 방향으로 답변하세요:<ul><li>슈터에서 배운 즉각적 피드백·타격감이 MMORPG 전투에 어떻게 적용 가능한지</li><li>MMORTS에서 배운 대규모 전략·길드 콘텐츠 설계가 MMORPG RvR에 어떤 시너지를 내는지</li><li>결국 MMORPG가 가장 하고 싶은 장르라는 진정성</li></ul>'
      }
    ]
  },
  {
    id: 'system',
    icon: '🔧',
    color: '#f0c040',
    title: '시스템 설계 & 데이터 구조',
    desc: '담당 업무 핵심 — 핵심 시스템·데이터 테이블 설계 역량을 검증하는 질문들입니다.',
    questions: [
      {
        q: '"시스템 모듈화"를 핵심 역량으로 강조하셨는데, 구체적으로 스킬 시스템을 모듈화한 과정과 그 전후 생산성 차이를 설명해주세요.',
        prob: 'high',
        type: '핵심 역량',
        answer: '포트폴리오의 핵심 키워드인 <strong>"모듈화"</strong>는 반드시 깊게 파고드는 질문이 나옵니다. 택탄 프로젝트에서:<ul><li>행위/조건/결과/연출을 분리한 구체적 구조</li><li>모듈화 전: 영웅 1개 추가 시 소요 시간 → 모듈화 후: 50% 단축된 구체적 수치</li><li>기사단 아이템 기획서처럼 SkillEffect 테이블을 재활용한 사례</li></ul><div class="tip-box">기사단 아이템에서 기존 SkillEffect 시스템을 재활용한 설계가 "모듈화의 실전 적용" 증거로 매우 강력합니다.</div>'

        type: '포폴 심화',

      },
      {

        prob: 'mid',
        type: '설계 프로세스',

      },
      {
        q: 'Excel VBA로 맵 제작 툴을 직접 만드셨다고 하셨는데, 기획자가 직접 툴을 만드는 게 왜 중요하다고 생각하시나요?',

// Render nav
const nav = document.getElementById('nav');
const allBtn = document.createElement('button');
allBtn.className = 'nav-btn active';
allBtn.textContent = '전체';
allBtn.dataset.id = 'all';
nav.appendChild(allBtn);

data.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = cat.title.split(' & ')[0].split(' ')[0];
  btn.dataset.id = cat.id;
  nav.appendChild(btn);
});

// Render content
function renderContent(filterId) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  let globalIdx = 0;

  const cats = filterId === 'all' ? data : data.filter(c => c.id === filterId);

  cats.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category';
    section.innerHTML = `
      <div class="category-header">
        <div class="category-icon" style="background:${cat.color}18; color:${cat.color}">${cat.icon}</div>
        <div class="category-title">${cat.title}</div>
      </div>
      <div class="category-desc">${cat.desc}</div>
    `;

    cat.questions.forEach((q, i) => {
      globalIdx++;
      const idx = globalIdx;
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="question-top" data-idx="${idx}">
          <span class="q-number">Q${String(idx).padStart(2,'0')}</span>
          <div class="q-body">
            <div class="q-text">${q.q}</div>
            <div class="q-tags">
              <span class="q-tag ${q.prob}">${q.prob === 'high' ? '출제확률 높음' : q.prob === 'mid' ? '출제확률 보통' : '출제확률 낮음'}</span>
              <span class="q-tag type">${q.type}</span>
            </div>
          </div>
          <span class="q-expand" id="exp-${idx}">▼</span>
        </div>
        <div class="answer-panel" id="panel-${idx}">
          <div class="answer-inner">
            <div class="answer-label">답변 전략</div>
            <div class="answer-text">${q.answer}</div>
          </div>
        </div>
      `;

      card.querySelector('.question-top').addEventListener('click', () => {
        const panel = document.getElementById('panel-' + idx);
        const exp = document.getElementById('exp-' + idx);
        panel.classList.toggle('open');
        exp.classList.toggle('open');
      });

      section.appendChild(card);
    });

    content.appendChild(section);
  });
}

// Nav click
nav.addEventListener('click', e => {
  if (!e.target.classList.contains('nav-btn')) return;
  nav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderContent(e.target.dataset.id);
});

renderContent('all');
</script>
